name: Update Patch Version Names

on:
  schedule:
    - cron: "17 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-patch-version-names:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Regenerate official patch version names
        run: npm run generate:patch-version-names

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/update-patch-version-names
          commit-message: "chore: update patch version names"
          title: "chore: update patch version names"
          body: |
            Refreshes `apps/web/lib/generated/patch-version-names.ts` from GGG's official developer changelog.

            This workflow only updates the committed mapping when a new PoE1 major patch label is published.
          delete-branch: true
